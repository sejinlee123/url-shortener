name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "What would you like to deploy?"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - backend_only
          - frontend_only

concurrency:
  group: terraform-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform-and-backend:
    name: Infrastructure and Backend
    if: |
      github.event_name == 'push' || 
      github.event.inputs.deploy_target == 'all' || 
      github.event.inputs.deploy_target == 'backend_only'
    runs-on: ubuntu-latest
    outputs:
      api_url: ${{ steps.tf-apply.outputs.API_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"

      - name: Build Go Binary
        run: |
          cd backend
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o bootstrap cmd/api/main.go
          zip ../lambda_function.zip bootstrap

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Apply
        id: tf-apply
        working-directory: ./terraform
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          CLOUDFRONT_ACM_CERTIFICATE_ARN: ${{ secrets.CLOUDFRONT_ACM_CERTIFICATE_ARN }}
        run: |
          terraform init
          if [ -n "$CLOUDFRONT_ACM_CERTIFICATE_ARN" ]; then
            terraform apply -auto-approve -var-file="dev.tfvars" \
              -var="neon_database_url=$NEON_DATABASE_URL" \
              -var="cloudfront_acm_certificate_arn=$CLOUDFRONT_ACM_CERTIFICATE_ARN"
          else
            terraform apply -auto-approve -var-file="dev.tfvars" \
              -var="neon_database_url=$NEON_DATABASE_URL"
          fi
          echo "API_URL=$(terraform output -raw api_url)" >> $GITHUB_OUTPUT

  frontend-deploy:
    name: Build and Deploy Frontend
    needs: terraform-and-backend
    if: |
      always() && !failure() && !cancelled() &&
      (github.event_name == 'push' || 
       github.event.inputs.deploy_target == 'all' || 
       github.event.inputs.deploy_target == 'frontend_only')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Get API URL
        id: get-url
        working-directory: ./terraform
        run: |
          # Use custom domain so the built frontend calls https://urlshortenerfree.xyz/api/...
          echo "URL=https://urlshortenerfree.xyz" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Frontend
        working-directory: ./url_shortener
        env:
          VITE_API_URL: ${{ steps.get-url.outputs.URL }}
        run: |
          npm install
          npm run build

      - name: Sync to S3
        run: |
          aws s3 sync ./url_shortener/dist s3://url-shortener-s3-bucket-sejinlee123 --delete
