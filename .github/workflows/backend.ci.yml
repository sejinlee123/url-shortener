name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "What would you like to deploy?"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - backend_only
          - frontend_only

concurrency:
  group: terraform-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform-and-backend:
    name: Infrastructure and Backend
    if: |
      github.event_name == 'push' || 
      github.event.inputs.deploy_target == 'all' || 
      github.event.inputs.deploy_target == 'backend_only'
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-2
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"

      - name: Build Go Binary
        run: |
          cd backend
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o bootstrap cmd/api/main.go
          zip ../lambda_function.zip bootstrap

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Apply
        id: tf-apply
        working-directory: ./terraform
        run: |
          terraform init
          terraform apply -auto-approve -var-file="dev.tfvars"
          echo "API_URL=$(terraform output -raw api_url)" >> $GITHUB_OUTPUT

    outputs:
      api_url: ${{ steps.tf-apply.outputs.API_URL }}

  frontend-deploy:
    name: Build and Deploy Frontend
    needs: terraform-and-backend
    if: |
      always() && 
      (github.event_name == 'push' || 
       github.event.inputs.deploy_target == 'all' || 
       github.event.inputs.deploy_target == 'frontend_only')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Get API URL
        id: get-url
        working-directory: ./terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-2
        run: |
          # Use the output from the backend job if available; 
          # otherwise, fetch it directly from existing Terraform state.
          if [ "${{ needs.terraform-and-backend.outputs.api_url }}" != "" ]; then
            echo "URL=${{ needs.terraform-and-backend.outputs.api_url }}" >> $GITHUB_OUTPUT
          else
            terraform init
            echo "URL=$(terraform output -raw api_url)" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Frontend
        working-directory: ./url_shortener
        env:
          VITE_API_URL: ${{ steps.get-url.outputs.URL }}
        run: |
          npm install
          npm run build

      - name: Sync to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          aws s3 sync ./url_shortener/dist s3://url-shortener-s3-bucket-sejinlee123 --delete
