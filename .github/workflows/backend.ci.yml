name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  terraform-and-backend:
    name: Infrastructure and Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"

      - name: Build Go Binary
        run: |
          cd backend
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o bootstrap cmd/api/main.go
          zip ../lambda_function.zip bootstrap

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Apply
        id: tf-apply
        working-directory: ./terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform init
          terraform apply -auto-approve
          # We save it as API_URL here
          echo "API_URL=$(terraform output -raw api_url)" >> $GITHUB_OUTPUT

    outputs:
      api_url: ${{ steps.tf-apply.outputs.API_URL }} # Matches the uppercase 'API_URL' above

  frontend-deploy:
    name: Build and Deploy Frontend
    needs: terraform-and-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Frontend
        working-directory: ./url_shortener # Updated to your directory name
        env:
          VITE_API_URL: ${{ needs.terraform-and-backend.outputs.api_url }}
        run: |
          npm install
          npm run build

      - name: Sync to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          # Syncing from the url_shortener/dist folder
          aws s3 sync ./url_shortener/dist s3://url-shortener-s3-bucket-sejinlee123 --delete
